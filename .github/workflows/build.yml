name: Build & Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Compile & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compile server
        run: ./gradlew :server:compileKotlin

      - name: Compile shared (JVM)
        run: ./gradlew :shared:compileKotlinJvm

      - name: Compile composeApp (JVM)
        run: ./gradlew :composeApp:compileKotlinJvm

      # Integration tests (*IntegrationTest) auto-excluded on CI via build.gradle.kts
      - name: Run server unit tests
        run: ./gradlew :server:test
